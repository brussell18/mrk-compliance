    <div class="panel-body">
      <div class="panel-pills">
        ${getProgramBadges(p) || `<span class="pill ${PROGRAM_PILL[prog]}">${PROGRAM_LABEL[prog]}</span>`}
        ${amiPills}
        ${getSeniorAgeTag(p) ? `<span class="pill pill-senior">${getSeniorAgeTag(p)}</span>` : ""}
        <span style="font-size:11px;color:#9aa4ae">${p.totalUnits} units</span>
      </div>
      <div class="section">
        <div class="section-title"><div class="section-bar"></div>Unit Mix</div>
        <div class="unit-mix">${mixHtml}</div>
      </div>
      ${certSectionHtml}
      ${renderLastInspection(p)}
      ${regAgreementsHtml}
    </div>`;

  document.getElementById("overlay").classList.add("open");
}

function closePanel() { document.getElementById("overlay").classList.remove("open"); }
document.addEventListener("keydown", e => { if (e.key === "Escape") closePanel(); });
render();

function openInspectionSummary() {
  const fmtD = d => { if(!d) return '<span style="color:#9ca3af">—</span>'; const [y,m,dy]=d.split('-'); return `${+m}/${+dy}/${y}`; };
  const SCORE_COLOR = {
    "Superior":"#00c875","Above Average":"#007eb5","Satisfactory":"#9d50dd",
    "Below Average":"#fdab3d","Unsatisfactory":"#df2f4a","N/A":"#9ca3af"
  };
  function morBadge(score) {
    if (!score || score === 'N/A') return '<span style="color:#9ca3af;font-size:11px">N/A</span>';
    const col = SCORE_COLOR[score] || '#6b7280';
    return `<span style="display:inline-block;background:${col}22;color:${col};border:1px solid ${col}55;border-radius:4px;padding:2px 8px;font-size:10.5px;font-weight:700">${score}</span>`;
  }
  function nspireBadge(score) {
    if (!score) return '<span style="color:#9ca3af;font-size:11px">—</span>';
    const n = parseFloat(score);
    const col = isNaN(n) ? '#6b7280' : n >= 90 ? '#00c875' : n >= 80 ? '#007eb5' : '#df2f4a';
    return `<span style="display:inline-block;background:${col}22;color:${col};border:1px solid ${col}55;border-radius:4px;padding:2px 8px;font-size:10.5px;font-weight:700">${score}</span>`;
  }
  function nextCell(val) {
    if (!val) return '<span style="color:#9ca3af">—</span>';
    const isOver = val.toLowerCase().startsWith('overdue');
    return `<span style="color:${isOver?'#dc2626':'var(--dk-grey)'};font-size:11px;font-weight:${isOver?'600':'400'}">${val}</span>`;
  }

  // Compute stats
  let totalTracked = 0, overdueCount = 0, upcomingCount = 0;
  const now = new Date();
  const in12 = new Date(now); in12.setFullYear(in12.getFullYear()+1);
  PORTFOLIO.forEach(p => {
    if (!p.lastInspection) return;
    totalTracked++;
    ['mor','nspire'].forEach(t => {
      const obj = p.lastInspection[t];
      if (!obj) return;
      if (obj.next && obj.next.toLowerCase().startsWith('overdue')) overdueCount++;
      if (obj.next && !obj.next.toLowerCase().startsWith('overdue')) {
        // try to parse a year from the next string
        const m = obj.next.match(/\b(20\d{2})\b/);
        if (m) {
          const yr = parseInt(m[1]);
          if (yr <= in12.getFullYear()) upcomingCount++;
        }
      }
    });
  });

  // Group by region
  const regions = [];
  const seen = new Set();
  PORTFOLIO.forEach(p => { if (!seen.has(p.region)) { regions.push(p.region); seen.add(p.region); } });

  const statCard = (val, label, color) =>
    `<div style="background:white;border-radius:8px;padding:14px 20px;border:1px solid var(--lt-grey);text-align:center;flex:1;min-width:120px">
      <div style="font-size:26px;font-weight:800;color:${color};font-family:'IBM Plex Mono',monospace">${val}</div>
      <div style="font-size:11px;color:var(--mid-grey);margin-top:3px;font-weight:500">${label}</div>
    </div>`;

  let sectionsHtml = '';
  regions.forEach(region => {
    const props = PORTFOLIO.filter(p => p.region === region);
    const rows = props.map(p => {
      const li = p.lastInspection;
      if (!li) {
        return `<tr style="border-top:1px solid var(--lt-grey)">
          <td style="padding:9px 12px;font-size:12px;font-weight:600;color:var(--ink)">${p.name}</td>
          <td colspan="6" style="padding:9px 12px;font-size:11px;color:#9ca3af;font-style:italic">Not on NSPIRE &amp; MOR Board</td>
        </tr>`;
      }
      const mor = li.mor || {};
      const nsp = li.nspire || {};
      return `<tr style="border-top:1px solid var(--lt-grey)">
        <td style="padding:9px 12px;font-size:12px;font-weight:600;color:var(--ink);white-space:nowrap">
          ${p.name}
          <a href="${li.mondayUrl}" target="_blank" style="font-size:9px;color:var(--teal);text-decoration:none;margin-left:6px;font-weight:500">↗</a>
        </td>
        <td style="padding:9px 12px;font-size:11px;font-family:'IBM Plex Mono',monospace;white-space:nowrap">${fmtD(mor.date)}</td>
        <td style="padding:9px 12px">${morBadge(mor.score)}</td>
        <td style="padding:9px 12px;max-width:180px">${nextCell(mor.next)}</td>
        <td style="padding:9px 12px;font-size:11px;font-family:'IBM Plex Mono',monospace;white-space:nowrap">${fmtD(nsp.date)}</td>
        <td style="padding:9px 12px">${nspireBadge(nsp.score)}</td>
        <td style="padding:9px 12px;max-width:200px">${nextCell(nsp.next)}</td>
      </tr>`;
    }).join('');

    sectionsHtml += `
      <div style="margin-bottom:28px">
        <div style="font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mid-grey);padding:0 0 8px 2px;border-bottom:2px solid var(--lt-grey);margin-bottom:2px">${region}</div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;min-width:700px">
            <thead>
              <tr style="background:var(--blue-pale)">
                <th style="padding:7px 12px;text-align:left;font-size:10px;color:var(--blue-dark);font-weight:700;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap">Property</th>
                <th colspan="3" style="padding:7px 12px;text-align:left;font-size:10px;color:#5b21b6;font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-left:2px solid #ddd6fe;background:#ede9fe">MOR</th>
                <th colspan="3" style="padding:7px 12px;text-align:left;font-size:10px;color:var(--teal);font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-left:2px solid #a7f3d0;background:#ecfdf5">NSPIRE</th>
              </tr>
              <tr style="background:#f8f9fb">
                <th style="padding:5px 12px;text-align:left;font-size:9.5px;color:var(--mid-grey);font-weight:600"></th>
                <th style="padding:5px 12px;text-align:left;font-size:9.5px;color:var(--mid-grey);font-weight:600;border-left:2px solid #ddd6fe">Last Date</th>
                <th style="padding:5px 12px;text-align:left;font-size:9.5px;color:var(--mid-grey);font-weight:600">Score</th>
                <th style="padding:5px 12px;text-align:left;font-size:9.5px;color:var(--mid-grey);font-weight:600">Next Expected</th>
                <th style="padding:5px 12px;text-align:left;font-size:9.5px;color:var(--mid-grey);font-weight:600;border-left:2px solid #a7f3d0">Last Date</th>
                <th style="padding:5px 12px;text-align:left;font-size:9.5px;color:var(--mid-grey);font-weight:600">Score</th>
                <th style="padding:5px 12px;text-align:left;font-size:9.5px;color:var(--mid-grey);font-weight:600">Next Expected</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  });

  const today = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  document.getElementById('insp-panel').innerHTML = `
    <div style="background:var(--blue-dark);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:10;border-bottom:3px solid var(--orange)">
      <div>
        <div style="font-size:14px;font-weight:700;color:white">Agency Inspection / Audit Summary</div>
        <div style="font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.06em;margin-top:1px">NSPIRE &amp; MOR — As of ${today}</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <a href="https://mrk-partners-company.monday.com/boards/9261066122" target="_blank" style="font-size:11px;color:rgba(255,255,255,.6);text-decoration:none;font-weight:500">Open Monday Board ↗</a>
        <button onclick="closeInspectionSummary()" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,.6);font-size:22px;line-height:1;padding:0" onmouseover="this.style.color='white'" onmouseout="this.style.color='rgba(255,255,255,.6)'">&times;</button>
      </div>
    </div>
    <div style="padding:24px 32px">
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px">
        ${statCard(totalTracked, 'Properties Tracked', 'var(--blue-dark)')}
        ${statCard(overdueCount, 'Overdue Inspections', '#dc2626')}
        ${statCard(upcomingCount, 'Due Within 12 Months', '#d97706')}
        ${statCard(PORTFOLIO.length - totalTracked, 'Not Yet on Board', '#9ca3af')}
      </div>
      ${sectionsHtml}
    </div>`;

  document.getElementById('insp-overlay').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closeInspectionSummary() {
  document.getElementById('insp-overlay').style.display = 'none';
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeInspectionSummary(); });
</script>
</body>
</html>
