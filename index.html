<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rent, Income &amp; Utility Allowance Monitor — MRK Partners</title>
<script>
(function(){
  if(sessionStorage.getItem('mrk_auth')==='1') return;
  document.addEventListener('DOMContentLoaded', function(){
    document.body.style.display='none';
    var overlay = document.createElement('div');
    overlay.id = 'pw-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:#1e4d68;display:flex;align-items:center;justify-content:center;z-index:99999;font-family:DM Sans,sans-serif;';
    overlay.innerHTML = '<div style="background:#fff;border-radius:12px;padding:40px 48px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.3);min-width:320px">'
      + '<div style="font-size:22px;font-weight:700;color:#1e4d68;margin-bottom:8px">MRK Partners</div>'
      + '<div style="font-size:14px;color:#666;margin-bottom:24px">Compliance Tracker — Team Access</div>'
      + '<input id="pw-input" type="password" placeholder="Enter password" autofocus style="width:100%;box-sizing:border-box;padding:10px 14px;font-size:15px;border:1.5px solid #ccc;border-radius:6px;outline:none;margin-bottom:12px">'
      + '<div id="pw-error" style="color:#c0392b;font-size:13px;min-height:18px;margin-bottom:8px"></div>'
      + '<button id="pw-btn" style="background:#2d6a8f;color:#fff;border:none;border-radius:6px;padding:10px 32px;font-size:15px;font-weight:600;cursor:pointer;width:100%">Enter</button>'
      + '</div>';
    document.body.parentElement.appendChild(overlay);
    function attempt(){
      if(document.getElementById('pw-input').value==='mrk'){
        sessionStorage.setItem('mrk_auth','1');
        overlay.remove();
        document.body.style.display='';
      } else {
        document.getElementById('pw-error').textContent='Incorrect password.';
        document.getElementById('pw-input').value='';
        document.getElementById('pw-input').focus();
      }
    }
    document.getElementById('pw-btn').addEventListener('click', attempt);
    document.getElementById('pw-input').addEventListener('keydown', function(e){ if(e.key==='Enter') attempt(); });
  });
})();
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@300;400;500;600;700&display=swap');
  :root {
    --blue:       #2d6a8f;
    --blue-dark:  #1e4d68;
    --blue-light: #3d7fa8;
    --blue-pale:  #eaf3f8;
    --orange:     #c8601a;
    --orange-lt:  #e07840;
    --orange-pale:#fdf0e8;
    --white:      #ffffff;
    --off-white:  #f5f6f7;
    --lt-grey:    #e8eaec;
    --mid-grey:   #9aa4ae;
    --dk-grey:    #4a5568;
    --charcoal:   #2d3748;
    --ink:        #1a202c;
    --green:      #16a34a;
    --amber:      #d97706;
    --red:        #dc2626;
    --purple:     #7c3aed;
    --teal:       #0e7490;
    --cyan:       #0891b2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--off-white); color: var(--ink); min-height: 100vh; }

  /* ── HEADER ── */
  .header {
    background: var(--blue-dark); padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px; position: sticky; top: 0; z-index: 100;
    border-bottom: 3px solid var(--orange);
  }
  .header-logo-wrap { display: flex; align-items: center; gap: 0; }
  .header-logo-img { height: 30px; width: auto; filter: brightness(0) invert(1); display: block; }
  .header-logo-fallback { font-size: 16px; font-weight: 800; color: white; letter-spacing: -0.02em; font-family: 'DM Sans', sans-serif; }
  .header-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.2); margin: 0 18px; }
  .header-title-wrap { display: flex; flex-direction: column; justify-content: center; }
  .header-tool-name { font-size: 13px; font-weight: 700; color: white; letter-spacing: -0.01em; line-height: 1.2; }
  .header-tool-sub { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.45); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; }
  .header-meta { font-size: 10.5px; color: rgba(255,255,255,0.4); font-family: 'IBM Plex Mono', monospace; text-align: right; line-height: 1.6; }

  /* ── CONTROLS ── */
  .controls {
    background: white; border-bottom: 1px solid var(--lt-grey);
    padding: 12px 32px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .controls select, .controls input {
    border: 1px solid var(--lt-grey); border-radius: 6px; padding: 6px 10px;
    font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--charcoal);
    background: var(--off-white); cursor: pointer; outline: none;
  }
  .controls select:focus, .controls input:focus { border-color: var(--blue); }
  .controls input { min-width: 180px; }

  /* ── STATS ── */


  /* ── GRID ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; padding: 16px 32px 32px; }

  /* ── CARDS ── */
  .card { background: white; border: 1px solid var(--lt-grey); border-radius: 10px; padding: 14px; cursor: pointer; transition: box-shadow .15s, transform .12s; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--lt-grey); }
  .card.status-compliant::before  { background: var(--green); }
  .card.status-at-limit::before   { background: var(--amber); }
  .card.status-over-limit::before { background: var(--red); }
  .card.status-no-data::before    { background: var(--mid-grey); }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); transform: translateY(-1px); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .card-name { font-weight: 700; font-size: 14px; color: var(--ink); line-height: 1.2; }
  .card-county { font-size: 10px; color: var(--mid-grey); margin-top: 2px; }
  .card-units { font-size: 11px; color: var(--mid-grey); font-family: 'IBM Plex Mono', monospace; white-space: nowrap; text-align: right; }
  .card-pills { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; align-items: center; }
  /* MRK Card — Program & Set-aside rows */
  .card-prog-row { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:4px; }
  .prog-badge { font-size:9.5px; font-weight:700; padding:2px 8px; border-radius:12px; letter-spacing:.04em; text-transform:uppercase; white-space:nowrap; background:var(--blue-dark); color:#fff; }
  .prog-badge.bond  { background:#166534; }
  .prog-badge.hud   { background:#5b21b6; }
  .prog-badge.pbv   { background:#0e7490; }
  .prog-badge.city  { background:#92400e; }
  .prog-badge.other { background:#64748b; }
  .prog-badge.hud-loan { background:#166534; }
  .prog-badge.home { background:#c2410c; }
  .prog-badge.home-htf { background:#9a3412; }
  .card-sa-row  { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:5px; }
  .card-ua-row  { display:flex; align-items:center; gap:5px; flex-wrap:wrap; margin-bottom:5px; }
  .card-ua-label{ font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--mid-grey); }
  .card-ua-chips{ display:inline-flex; flex-wrap:wrap; gap:4px; }
  .card-ua-chip { font-size:9.5px; font-family:'DM Sans',sans-serif; font-weight:500; color:var(--dk-grey); background:var(--off-white); border:1px solid var(--lt-grey); border-radius:4px; padding:1px 6px; }
  .sa-badge { font-size:9px; font-weight:600; padding:1px 7px; border-radius:10px; background:var(--blue-pale); color:var(--blue-dark); border:1px solid var(--blue-dark)22; white-space:nowrap; }
  .sa-badge.senior { background:#fdf2f8; color:#9d174d; border:1px solid #9d174d33; }
  .pill { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; letter-spacing: .02em; text-transform: uppercase; white-space: nowrap; }
  /* Compliance status pills */
  .pill-compliant  { background: #dcfce7; color: #15803d; }
  .pill-at-limit   { background: #fef3c7; color: #92400e; }
  .pill-over-limit { background: #fee2e2; color: #991b1b; }
  .pill-no-data    { background: #f1f5f9; color: #64748b; }
  /* Program pills */
  .pill-lihtc { background: #e0f2fe; color: #075985; }
  .pill-hud   { background: #ede9fe; color: #5b21b6; }
  .pill-both  { background: #f0fdf4; color: #166534; }
  .pill-unknown { background: #f1f5f9; color: #94a3b8; }
  /* AMI pill */
  .pill-ami { background: var(--blue-pale); color: var(--blue-dark); }
  /* Senior restriction pill */
  .pill-senior { background: #fdf2f8; color: #9d174d; border: 1px solid #9d174d33; }

  .card-rent-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 6px; }
  .rent-figures { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .rent-figures .rf-label { font-size: 10px; color: var(--mid-grey); font-family: 'DM Sans', sans-serif; font-weight: 400; }
  .rent-headroom { font-size: 11px; text-align: right; }
  .headroom-ok  { color: var(--green); font-weight: 600; }
  .headroom-tight { color: var(--amber); font-weight: 600; }
  .headroom-over { color: var(--red); font-weight: 600; }
  .card-footer { display: flex; justify-content: space-between; margin-top: 7px; }
  .card-foot-item { font-size: 10px; color: var(--mid-grey); }

  /* ── OVERLAY / PANEL ── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 200; display: none; align-items: flex-start; justify-content: flex-end; }
  .overlay.open { display: flex; }
  .panel { background: white; width: 620px; max-width: 100vw; height: 100vh; overflow-y: auto; box-shadow: -4px 0 24px rgba(0,0,0,.12); }
  .panel-header { background: var(--blue-dark); padding: 18px 20px; position: sticky; top: 0; z-index: 10; border-bottom: 3px solid var(--orange); display: flex; justify-content: space-between; align-items: flex-start; }
  .panel-region { font-size: 10px; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 2px; }
  .panel-name { font-size: 18px; font-weight: 700; color: white; }
  .panel-addr { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 3px; }
  .panel-close { background: none; border: none; cursor: pointer; color: rgba(255,255,255,.6); font-size: 22px; line-height: 1; padding: 0; margin-top: -2px; }
  .panel-close:hover { color: white; }
  .panel-body { padding: 20px; }
  .panel-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  .section { margin-bottom: 20px; }
  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--mid-grey); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .section-bar { width: 3px; height: 12px; background: var(--orange); border-radius: 2px; }
  .unit-mix { display: flex; gap: 8px; flex-wrap: wrap; }
  .mix-item { background: var(--blue-pale); border-radius: 6px; padding: 6px 10px; text-align: center; }
  .mix-val { font-size: 16px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; color: var(--blue-dark); }
  .mix-lbl { font-size: 10px; color: var(--mid-grey); }
  .empty-box { background: var(--off-white); border: 1px dashed var(--lt-grey); border-radius: 8px; padding: 20px; text-align: center; color: var(--mid-grey); font-size: 12px; }

  /* ── RENT LIMITS TABLE ── */
  .rent-table-wrap { overflow-x: auto; margin-top: 8px; }
  .rent-table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 480px; }
  .rent-table th { background: var(--blue-pale); padding: 6px 8px; text-align: right; font-size: 10px; color: var(--blue-dark); font-weight: 700; text-transform: uppercase; letter-spacing: .04em; border-bottom: 2px solid #c5dce9; white-space: nowrap; }
  .rent-table th:first-child, .rent-table th:nth-child(2) { text-align: left; }
  .rent-table td { padding: 6px 8px; border-top: 1px solid rgba(0,0,0,.05); text-align: right; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  .rent-table td:first-child, .rent-table td:nth-child(2) { text-align: left; font-family: 'DM Sans', sans-serif; font-weight: 500; }
  .rent-table tr:hover td { background: #f8fafc; }
  .headroom-cell-ok   { color: var(--green); font-weight: 700; }
  .headroom-cell-tight { color: var(--amber); font-weight: 700; }
  .headroom-cell-over  { color: var(--red); font-weight: 700; }

  /* Income limits table */
  .income-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 8px; }
  .income-table th { background: #f0fdf4; padding: 5px 8px; text-align: right; font-size: 10px; color: #166534; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; border-bottom: 2px solid #bbf7d0; }
  .income-table th:first-child { text-align: left; }
  .income-table td { padding: 5px 8px; border-top: 1px solid rgba(0,0,0,.05); text-align: right; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  .income-table td:first-child { text-align: left; font-family: 'DM Sans', sans-serif; font-weight: 500; }
  .income-table tr:hover td { background: #f0fdf4; }

  /* HUD contract table */
  .hud-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 8px; }
  .hud-table th { background: #ede9fe; padding: 5px 8px; text-align: right; font-size: 10px; color: #5b21b6; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; border-bottom: 2px solid #ddd6fe; }
  .hud-table th:first-child { text-align: left; }
  .hud-table td { padding: 5px 8px; border-top: 1px solid rgba(0,0,0,.05); text-align: right; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  .hud-table td:first-child { text-align: left; font-family: 'DM Sans', sans-serif; font-weight: 500; }

  /* ── CERTIFICATION BLOCK ── */
  .cert-block {
    background: #fafbfc; border: 1.5px solid var(--lt-grey);
    border-radius: 10px; padding: 20px 22px; margin-top: 8px;
  }
  .cert-title { font-size: 13px; font-weight: 700; color: var(--blue-dark); margin-bottom: 14px; text-transform: uppercase; letter-spacing: .06em; border-bottom: 2px solid var(--lt-grey); padding-bottom: 8px; }
  .cert-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .cert-meta-item .cm-label { font-size: 10px; color: var(--mid-grey); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 2px; }
  .cert-meta-item .cm-val { font-size: 13px; font-weight: 600; color: var(--ink); }
  .cert-section-head { font-size: 10px; font-weight: 700; color: var(--mid-grey); text-transform: uppercase; letter-spacing: .06em; margin: 12px 0 6px; }
  .cert-sig-line { display: flex; gap: 32px; margin-top: 20px; border-top: 1px solid var(--lt-grey); padding-top: 14px; }
  .cert-sig-item { flex: 1; }
  .cert-sig-label { font-size: 10px; color: var(--mid-grey); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
  .cert-sig-line-rule { border-bottom: 1px solid var(--ink); height: 24px; margin-top: 4px; }
  .print-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--blue-dark); color: white;
    border: none; border-radius: 6px; padding: 8px 14px;
    font-size: 12px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    cursor: pointer; margin-top: 14px; transition: background .15s;
  }
  .print-btn:hover { background: var(--blue); }

  /* todo/verify badge */
  .todo-tag { font-size: 9px; background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; border-radius: 3px; padding: 0 4px; margin-left: 4px; font-weight: 700; vertical-align: middle; }

  /* notes box */
  .notes-box { background: #fffbeb; border: 1px solid #fde68a; border-radius: 6px; padding: 10px 12px; font-size: 11px; color: #78350f; line-height: 1.5; margin-top: 8px; }

  .hidden { display: none !important; }
  /* ── YEAR PICKER ── */
  .yr-btn { border:1.5px solid var(--lt-grey); border-radius:5px; padding:5px 10px; font-size:11px; font-weight:600; font-family:'DM Sans',sans-serif; background:white; color:var(--mid-grey); cursor:pointer; transition:all .12s; }
  .yr-btn:hover { border-color:var(--blue); color:var(--blue); }
  .yr-btn.active { background:var(--blue-dark); border-color:var(--blue-dark); color:white; }
  .yr-sep { color:var(--lt-grey); font-size:13px; }
  /* ── CERT RIBBON ── */
  .cert-ribbon-btn:hover { filter:brightness(1.08); }

  /* ── PRINT ── */
  @media print {
    body > *:not(.overlay) { display: none !important; }
    .overlay { display: block !important; position: static !important; background: none !important; }
    .panel { width: 100% !important; height: auto !important; box-shadow: none !important; overflow: visible !important; }
    .panel-header { background: white !important; color: var(--ink) !important; print-color-adjust: exact; }
    .panel-name { color: var(--ink) !important; }
    .panel-region, .panel-addr { color: var(--dk-grey) !important; }
    .panel-close { display: none !important; }
    .panel-body > *:not(.cert-section-wrap) { display: none !important; }
    .cert-section-wrap { display: block !important; }
    .print-btn { display: none !important; }
    .cert-block { border: 1px solid #ccc !important; }
  }
</style>

<style>

  .map-legend-item { display:flex; align-items:center; gap:5px; color:var(--dk-grey); }

  .mrk-map-popup .leaflet-popup-content-wrapper { border-radius: 10px; box-shadow: 0 4px 24px rgba(0,0,0,.18); }

<body>
<div class="header">
  <div class="header-logo-wrap">
    <img src="https://mrkpartners.com/wp-content/uploads/2024/08/mrk-logo-new.svg"
         alt="MRK Partners" class="header-logo-img"
         onerror="this.outerHTML='<span class=&quot;header-logo-fallback&quot;>MRK Partners</span>'">
    <div class="header-divider"></div>
    <div class="header-title-wrap">
      <div class="header-tool-name">Rent, Income &amp; Utility Allowance Monitor</div>
      <div class="header-tool-sub">Portfolio Compliance Tracker</div>
    </div>
  </div>
  <div class="header-meta" id="header-meta"></div>
</div>
<div class="controls">
  <input type="text" id="search" placeholder="Search properties…" oninput="render()">
  <select id="fRegion" onchange="render()">
    <option value="">All States</option>
    <option>California</option>
    <option>Florida</option>
    <option>New Jersey</option>
    <option>Virginia</option>
    <option>Maryland</option>
    <option>Missouri</option>
    <option>Michigan</option>
    <option>Delaware</option>
    <option>Pennsylvania</option>
  </select>
  <select id="fProgram" onchange="render()">
    <option value="">All Programs</option>
    <option value="LIHTC">LIHTC</option>
    <option value="HUD">HUD</option>
    <option value="Both">Both</option>
    <option value="HUD Loan">HUD Loan</option>
    <option value="Unknown">Unknown</option>
  </select>
  <label style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--dk-grey);font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap">
    <input type="checkbox" id="fSenior" onchange="render()"> Senior restricted only

// ── COMPLIANCE LOGIC ──────────────────────────────────────────────────────────
// Returns: { status, primaryUnit, grossRent, ua, netLimit, actual, headroom }
function getComplianceInfo(p) {
  if (p.program === "Unknown" || (!p.lihtc && !p.hud)) {
    return { status: "no-data" };
  }

  if (p.program === "HUD") {
    const hud = p.hud;
    if (!hud || !hud.contractRents) return { status: "no-data" };
    const entries = Object.entries(hud.contractRents).filter(([,v]) => v != null);
    if (!entries.length) return { status: "no-data" };
    return {
      status: "no-data", // HUD contract compliance determined differently
      hudContracts: Object.fromEntries(entries),
      isHud: true
    };
  }

  if (p.program === "LIHTC" || p.program === "Both" || p.program === "LIHTC/HOME") {
    const l = p.lihtc;
    if (!l) return { status: "no-data" };

    // Pick primary AMI tier (first set-aside)
    const primaryAmi = l.setAsides?.[0]?.pct;
    if (!primaryAmi) return { status: "no-data" };
    const amiKey = primaryAmi + "%";

    const grossRents = l.grossRentLimits?.[amiKey] || {};
    const uas = l.utilityAllowances || {};
    const actuals = l.actualRents || {};

    // Find primary unit type
    const unitTypes = Object.keys(grossRents);
    if (!unitTypes.length) return { status: "no-data" };

    // Check if we have any actual rent data
    const hasActuals = unitTypes.some(u => actuals[u] != null);
    if (!hasActuals) return { status: "no-data" };

    let worstStatus = "compliant";
    const details = [];
    for (const ut of unitTypes) {
      const gross = grossRents[ut];
      const ua = uas[ut] || 0;
      const net = gross != null ? gross - ua : null;
      const actual = actuals[ut];
      if (actual == null || net == null) continue;
      const headroom = net - actual;
      let s = "compliant";
      if (actual > net) s = "over-limit";
      else if (headroom <= 25) s = "at-limit";
      details.push({ unit: ut, gross, ua, net, actual, headroom, status: s });
      if (s === "over-limit") worstStatus = "over-limit";
      else if (s === "at-limit" && worstStatus !== "over-limit") worstStatus = "at-limit";
    }

    if (!details.length) return { status: "no-data" };
    const primary = details[0];
    return {
      status: worstStatus,
      primaryUnit: primary.unit,
      grossRent: primary.gross,
      ua: primary.ua,
      netLimit: primary.net,
      actual: primary.actual,
      headroom: primary.headroom,
      amiPct: primaryAmi,
      allDetails: details
    };
  }

  return { status: "no-data" };
}

function fmt$(n) {
  if (n == null) return "—";
  return "$" + n.toLocaleString();
}
function fmtDate(d, style="short") {
  if (!d) return "—";
  const [y,m,day] = d.split("-").map(Number);
  const dt = new Date(y, m-1, day);
  return dt.toLocaleDateString("en-US", style==="long" ? {month:"long",day:"numeric",year:"numeric"} : {month:"short",year:"numeric"});
}

// ── SENIOR / AGE RESTRICTION DETECTION ────────────────────────────────────────
// Derived from regulatoryAgreements text (type/ref/setAsides) — there is no dedicated
// ageRestricted field in the data model, so this is a best-effort text match, not a
// verified legal field. Spot-check against the LURA/8609 before relying on it for compliance.
function _seniorAgreementText(p) {
  const raw = (p.regulatoryAgreements||[])
    .map(r => [r.type, r.ref, r.setAsides].filter(Boolean).join(" "))
    .join(" ");
  // Strip explicit negations (e.g. HUD "Non-Elderly" designations) so they don't
  // false-positive match on "elderly"/"senior" as a bare substring.
  return raw.replace(/non[- ]?(elderly|senior)/gi, "");
}
function isSeniorRestricted(p) {
  const text = _seniorAgreementText(p);
  return /senior|elderly|age[- ]restrict|\b(55|62|65)\+/i.test(text);
}
function getSeniorAgeTag(p) {
  const text = _seniorAgreementText(p);
  const m = text.match(/\b(55|62|65)\+/);
  if (m) return `Senior ${m[1]}+`;
  if (/senior|elderly|age[- ]restrict/i.test(text)) return "Senior";
  return null;
}

// ── METRO IL LOOKUP ───────────────────────────────────────────────────────────
function getMetroILForYear(county, year) {
  const mk = COUNTY_TO_METRO[county];
  if (!mk || !METRO_IL[mk]) return null;
  const m = METRO_IL[mk];
  return { data: m[year] || null, est: (m._est || []).includes(year), src: m._src, key: mk };
}

function getMaxHHCols(p) {
  const brMap = { studio:0, SRO:0, "1BR":1, "2BR":2, "2B1B":2, "2B2B":2, "3BR":3, "3B1B":3, "3B2B":3, "4BR":4, "5BR":5 };
  const active = Object.entries(p.unitMix || {}).filter(([,n]) => n > 0).map(([br]) => brMap[br] ?? 0);
  const maxBR = active.length ? Math.max(...active) : 2;
  const formulaCols = Math.max(4, Math.min(8, maxBR * 2 + 1));
  // Cap at the actual max person key present in the income limit data
  const il = p.lihtc?.incomeLimits ||
    (p.certHistory?.length ? p.certHistory[p.certHistory.length - 1]?.snapshot?.incomeLimits : null);
  if (il) {
    const firstAmi = Object.values(il)[0];
    if (firstAmi) {
      const dataCols = Math.max(...Object.keys(firstAmi).map(Number).filter(n => !isNaN(n)));
      if (dataCols > 0) return Math.min(formulaCols, dataCols);
    }
  }
  return formulaCols;
}

function computeGRL(unitType, pctKey, ilArr) {
  const IMPUTED = { studio:1, SRO:1, "1BR":1.5, "2BR":3, "3BR":4.5, "4BR":6 };
  const hh = IMPUTED[unitType] ?? IMPUTED[unitType?.toLowerCase()];
  if (hh == null || !ilArr) return null;
  if (Number.isInteger(hh)) return Math.floor(ilArr[hh-1] * 0.30 / 12);
  const lo = Math.floor(hh)-1, hi = Math.ceil(hh)-1;
  if (hi >= ilArr.length) return null;
  return Math.floor(((ilArr[lo]+ilArr[hi])/2) * 0.30 / 12);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function lookupUA(ua2, ut) {
  if (!ua2 || !ut) return 0;
  // Exact match first
  if (ua2[ut] != null) return ua2[ut];
  // Strip unit count suffix e.g. "2B1B (30u)" → "2B1B"
  const base = ut.replace(/\s*\([^)]*\)\s*$/, '').trim();
  if (ua2[base] != null) return ua2[base];
  // Handle 1BR
  if (ut.includes('1BR') || ut === '1BR') return ua2['1BR'] || 0;
  // Handle 2BR variants — check 2B1B, 2B2B, 2BR-A, 2BR
  if (ut.includes('2BR') || ut.startsWith('2B')) {
    return ua2['2B1B'] || ua2['2BR-A'] || ua2['2BR'] || 0;
  }
  // Handle 3BR variants — check 3B1B, 3B2B, 3BR-A, 3BR
  if (ut.includes('3BR') || ut.startsWith('3B')) {
    return ua2['3B1B'] || ua2['3BR-A'] || ua2['3BR'] || 0;
  }
  if (ut.toLowerCase().includes('studio') || ut.includes('SRO')) return ua2['studio'] || ua2['SRO'] || 0;
  return 0;
}
// Program badges derived from regulatoryAgreements
function getProgramBadges(p, targetIds) {
  // Only apply to specific properties for now; null = apply to all
  if (targetIds && !targetIds.includes(p.id)) return null;
  const regs = p.regulatoryAgreements || [];
  if (!regs.length) return null;
  const TYPE_MAP = {
    "LIHTC":"LIHTC","LIHTC/Bond":"LIHTC","Bond/LIHTC":"LIHTC",
    "Bond":"Bonds","Bond/Tax Credit":"Bonds","Bond/Other":"Bonds",
    "HUD Section 8":"HUD","HUD Section 8 PBV":"PBV","HUD":"HUD","HUD Loan":"HUD Loan",
    "City":"City","County":"County","MSHDA":"LIHTC",
    "HOME":"HOME","HTF":"HTF"
  };
  // Canonical left-to-right display order
  const SORT_ORDER = ["LIHTC","Bonds","HUD","PBV","City","County","HOME","HTF","HUD Loan"];
  const CLASS = {
    LIHTC:"",Bonds:"bond",HUD:"hud",PBV:"pbv",
    City:"city",County:"city","HUD Loan":"hud-loan","HOME":"home","HTF":"home-htf"
  };
  const seen = new Set();
  const collected = [];
  regs.forEach(r => {
    // Check full programType first (handles "HOME/HTF", "HUD Loan", etc.), then split
    const fullLabel = TYPE_MAP[r.programType] || null;
    const types = fullLabel ? [r.programType] : (r.programType||"").split("/").map(t=>t.trim());
    types.forEach(t => {
      const label = fullLabel || TYPE_MAP[t] || null;
      if (label && !seen.has(label)) { seen.add(label); collected.push(label); }
    });
  });
  // Sort badges in canonical order
  collected.sort((a,b) => {
    const ai = SORT_ORDER.indexOf(a), bi = SORT_ORDER.indexOf(b);
    if (ai !== -1 && bi !== -1) return ai - bi;
    if (ai !== -1) return -1; if (bi !== -1) return 1;
    return a.localeCompare(b);
  });
  return collected.length
    ? collected.map(l => `<span class="prog-badge ${CLASS[l]||"other"}">${l}</span>`).join("")
    : null;
}

// Get current UA breakdown as chips for the card
function getCardUAChips(p) {
  // Use most recent cert event UA if available, else lihtc.utilityAllowances
  let ua = null;
  const hist = p.certHistory || [];
  if (hist.length) {
    const sorted = [...hist].sort((a,b) => new Date(b.effectiveDate)-new Date(a.effectiveDate));
    for (const ev of sorted) {
      if (ev.snapshot?.utilityAllowances) { ua = ev.snapshot.utilityAllowances; break; }
    }
  }
  if (!ua) ua = p.lihtc?.utilityAllowances || {};
  const entries = Object.entries(ua).filter(([,v]) => v != null && v > 0);
  if (!entries.length) return "";
  const chips = entries.map(([ut,v]) => `<span class="card-ua-chip">${ut} $${v}</span>`).join("");
  return `<div class="card-ua-row"><span class="card-ua-label">UA</span><span class="card-ua-chips">${chips}</span></div>`;
}

// ── EFFECTIVE SNAPSHOT RESOLVER ───────────────────────────────────────────────
// Returns the cert snapshot that was in effect as of a given date, for a given property.
// If no date given, returns the most recent cert snapshot on or before TODAY.
function getEffectiveSnapshot(p, certIndex) {
  // Returns a FULLY RESOLVED snapshot for the cert at certIndex.
  // HUD-specific fields (hudContractRents, utilityAllowances, uaBreakdown) prefer the most recent
  // hud_contract trigger cert as their source so effective dates always reflect the 6/1 rent schedule,
  // not an income_limits cert that merely carries forward duplicate values.
  const hist = (p.certHistory || []).slice().sort((a,b) => a.effectiveDate.localeCompare(b.effectiveDate));
  if (!hist.length || certIndex == null || certIndex < 0) return null;
  const target = hist[certIndex];
  if (!target) return null;

  const FIELDS = ["incomeLimits","grossRentLimits","utilityAllowances","hudContractRents","uaBreakdown","rentsByAgreement","incomeLimitsByAgreement","incomeLimitSources","layeringLimits"];
  const HUD_FIELDS = new Set(["hudContractRents","utilityAllowances","uaBreakdown"]);
  const resolved = { effectiveDate: target.effectiveDate, label: target.label, source: target.source, trigger: target.trigger };

  FIELDS.forEach(field => {
    if (HUD_FIELDS.has(field)) {
      // Walk backwards; prefer the most recent hud_contract cert, fall back to any cert
      let fallback = null;
      for (let i = certIndex; i >= 0; i--) {
        const val = hist[i].snapshot?.[field];
        if (val != null) {
          const candidate = { val, from: i < certIndex ? hist[i].effectiveDate : null };
          if (hist[i].trigger === 'hud_contract') { resolved[field] = candidate; return; }
          if (!fallback) fallback = candidate; // first non-null found (non-hud_contract)
        }
      }
      resolved[field] = fallback || { val: null, from: null };
      return;
    }
    // Non-HUD fields: most recent non-null value regardless of trigger
    for (let i = certIndex; i >= 0; i--) {
      const val = hist[i].snapshot?.[field];
      if (val != null) { resolved[field] = { val, from: i < certIndex ? hist[i].effectiveDate : null }; return; }
    }
    resolved[field] = { val: null, from: null };
  });
  return resolved;
}

// ── CERT HISTORY PANEL ────────────────────────────────────────────────────────
function renderCertHistory(p) {
  const histAsc = (p.certHistory || []).slice().sort((a,b) => a.effectiveDate.localeCompare(b.effectiveDate));
  if (!histAsc.length) return '<div class="empty-box">No certification history</div>';

  const activeCertIndex = (_ACTIVE_CERT && _ACTIVE_CERT.propId === p.id && _ACTIVE_CERT.certIndex != null)
    ? _ACTIVE_CERT.certIndex : histAsc.length - 1;

  const eff = getEffectiveSnapshot(p, activeCertIndex);
  if (!eff) return '<div class="empty-box">No certification event selected</div>';

  // Gap-period detection: lihtcOnlyRents present → this is a MTSP gap event (HOME not yet released)
  const _lihtcOnlyRents = histAsc[activeCertIndex]?.snapshot?.lihtcOnlyRents || null;
  // HOME overlay detection: any home_htf_limits event exists
  const _hasHOMEOverlay = (p.certHistory||[]).some(c => c.trigger === 'home_htf_limits');
  // For gap events: carry forward prior event's income limits (HOME not yet released)
  const _ilEffSrc = (_lihtcOnlyRents && activeCertIndex > 0)
    ? getEffectiveSnapshot(p, activeCertIndex - 1)
    : eff;

  const iNote = (from) => { if(!from) return ""; const [y,m,d]=from.split('-'); return `<span style="font-size:9px;color:var(--mid-grey);font-style:italic;margin-left:4px">· from ${+m}/${+d}/${y}</span>`; };
  const hhCols = Array.from({length:getMaxHHCols(p)},(_,i)=>i+1);

  // ── Income Limits ─────────────────────────────────────────────────────────
  let incomeHtml = "";
  if (eff.incomeLimits?.val) {
    const il = eff.incomeLimits.val;
    // For HUD Section 8 "Both" properties: inject HUD income threshold row
    // Greenleaf: label 50% as "50% HUD LI" (Section 8 Low Income threshold)
    // Other Both properties: add 30% ELI row (~60% of 50%)
    let ilDisplay = {...il};
    const hasBothLayers = p.program === "Both" || p.program === "LIHTC/PBV";
    const isGreenleaf = p.id === "greenleaf";
    const isHUDS8 = (isGreenleaf || p.id === "cypress-pines" || p.id === "buckingham" || p.id === "claremont" || p.id === "lakeview-tower" || p.id === "casa-devon") && hasBothLayers;
    const amiKeys = Object.keys(ilDisplay);
    const rows = amiKeys.map(ami => {
      const row = ilDisplay[ami]||{};
      const is50HUD = ami === "50%" && (isGreenleaf || p.id === "lakeview-tower" || p.id === "casa-devon") && hasBothLayers;
      const is30HUD = ami === "30%" && isHUDS8;
      const ilSrc = eff.incomeLimitSources?.val?.[ami];
      const srcBadge = ilSrc ? ` <span style="font-size:9px;font-weight:600;color:var(--teal);background:var(--lt-grey);padding:1px 5px;border-radius:3px;margin-left:3px">${ilSrc}</span>` : "";
      const amiLbl = ami.split('-')[0];
      return `<tr${(is50HUD||is30HUD)?' style="background:#eff6ff"':''}><td>${amiLbl}${is50HUD?' <span style="font-size:9px;color:#1d4ed8">(HUD LI)</span>':""}${is30HUD?' <span style="font-size:9px;color:#1d4ed8">(HUD ELI)</span>':""}${srcBadge}</td>${hhCols.map(h=>`<td>${row[h]?"$"+Number(row[h]).toLocaleString():"—"}</td>`).join("")}</tr>`;
    }).join("");
    incomeHtml = `<div class="cert-section-head income" style="margin-top:10px">Income Limits${iNote(eff.incomeLimits.from)}</div>
      <div class="rent-table-wrap"><table class="income-table" style="font-size:10.5px">
        <tr><th>AMI%</th>${hhCols.map(h=>`<th>${h}p</th>`).join("")}</tr>${rows}</table></div>
      ${isGreenleaf && hasBothLayers ? `<div style="font-size:9.5px;color:var(--mid-grey);font-style:italic;margin-top:3px">50% AMI (HUD LI) is the applicable HUD Section 8 income threshold for tenant eligibility at move-in.</div>` : ""}
      ${isHUDS8 ? `<div style="font-size:9.5px;color:var(--mid-grey);font-style:italic;margin-top:3px">30% AMI (HUD ELI) is the applicable HUD Section 8 income threshold for tenant eligibility at move-in.</div>` : ""}`;
  }

  if (_hasHOMEOverlay) incomeHtml = ""; // Income limits shown in agreement-level section for HOME overlay properties

  // ── Other Affordable Layering (Vista Woods H&S limits) ───────────────────
  let layeringHtml = "";
  const _ll = eff.layeringLimits?.val ?? p.lihtc?.layeringLimits;
  if (_ll) {
    const snapIL = eff.incomeLimits?.val || {};
    const layerRows = _ll.rows.map(row => {
      const lims = row.fromSnapshot ? (snapIL[row.ami] || {}) : (row.limits || {});
      const srcBadge = `<span style="font-size:9px;font-weight:600;color:var(--teal);background:var(--lt-grey);padding:1px 5px;border-radius:3px;margin-left:4px">${row.source}</span>`;
      return `<tr><td>${row.ami}</td><td style="font-size:10px">${row.program}${srcBadge}</td>${hhCols.map(h=>`<td>${lims[h]?"$"+Number(lims[h]).toLocaleString():"—"}</td>`).join("")}</tr>`;
    }).join("");
    layeringHtml = `<div class="cert-section-head income" style="margin-top:10px">Other Affordable Layering — H&amp;S Income Limits</div>
      <div style="font-size:9.5px;color:var(--mid-grey);font-style:italic;margin-bottom:4px">Limits applicable above LIHTC/Bond per H&amp;S Code programs (Contra Costa County HCD FY${_ll.amiYear}). CTCAC 80% auto-populated from HUD MTSP.</div>
      <div class="rent-table-wrap"><table class="income-table" style="font-size:10.5px">
        <tr><th>AMI%</th><th>Program</th>${hhCols.map(h=>`<th>${h}p</th>`).join("")}</tr>${layerRows}</table></div>`;
  }

  // ── Income Limits by Agreement ────────────────────────────────────────────
  let ilByAgmtHtml = "";
  if (_ilEffSrc.incomeLimitsByAgreement?.val) {
    const ilba = _ilEffSrc.incomeLimitsByAgreement.val;
    let agmtSections = "";
    Object.entries(ilba).forEach(([agmtName, agmtData]) => {
      const {source, ...amiData} = agmtData;
      let rows = "";
      Object.entries(amiData).forEach(([ami, limits]) => {
        if (!limits) return;
        const amiLbl = ami.split('-')[0];
        rows += `<tr><td>${amiLbl}</td>${hhCols.map(h=>`<td>${limits[h]?"$"+Number(limits[h]).toLocaleString():"—"}</td>`).join("")}</tr>`;
      });
      if (rows) {
        agmtSections += `
          <div style="margin-top:8px;font-size:10px;font-weight:700;color:var(--dk-grey)">${agmtName}</div>
          <div class="rent-table-wrap"><table class="income-table" style="font-size:10.5px">
            <tr><th>AMI%</th>${hhCols.map(h=>`<th>${h}p</th>`).join("")}</tr>${rows}</table></div>`;
      }
    });
    if (agmtSections) ilByAgmtHtml = `<div class="cert-section-head income" style="margin-top:10px">Income Limits by Agreement${iNote(_ilEffSrc.incomeLimitsByAgreement?.from)}</div>
      <div style="font-size:9.5px;color:var(--mid-grey);font-style:italic;margin-bottom:4px">Effective income limit per program overlay — lesser of HUD MTSP vs HOME/HTF at each certification date.</div>
      ${agmtSections}`;
  }

  // ── Affordable Rents (or Tax Credit / Bond Rents) ────────────────────────
  let tcRentHtml = "";
  if (eff.rentsByAgreement?.val) {
    const rba = eff.rentsByAgreement.val;
    const uas = eff.utilityAllowances?.val || {};
    let agreementSections = "";
    Object.entries(rba).forEach(([agmtName, agmtData]) => {
      const {source, ...amiData} = agmtData;
      let rows = "";
      Object.entries(amiData).forEach(([ami, units]) => {
        Object.entries(units||{}).forEach(([ut, gross]) => {
          if (gross == null) return;
          const ua = lookupUA(uas, ut);
          const net = gross - ua;
          rows += `<tr><td>${ut}</td><td>${ami.split('-')[0]}</td><td>$${gross.toLocaleString()}</td>
            <td style="color:var(--red)">${ua?"($"+ua+")":"—"}</td>
            <td style="font-weight:700">$${net.toLocaleString()}</td></tr>`;
        });
      });
      if (rows) {
        agreementSections += `
          <div style="margin-top:8px;font-size:10px;font-weight:700;color:var(--dk-grey)">${agmtName}</div>
          <div class="rent-table-wrap"><table class="rent-table" style="font-size:10.5px">
            <tr><th>Unit</th><th>AMI%</th><th>Gross Limit</th><th>UA</th><th>Net Rent Limit</th></tr>${rows}</table></div>`;
      }
    });
    if (agreementSections) tcRentHtml = `<div class="cert-section-head tc" style="margin-top:10px">Affordable Rents${iNote(eff.grossRentLimits?.from||eff.rentsByAgreement?.from)}</div>${agreementSections}`;
  } else if (eff.grossRentLimits?.val) {
    const grl = eff.grossRentLimits.val;
    const uas = eff.utilityAllowances?.val || {};
    let rows = "";
    Object.keys(grl).forEach(ami => {
      Object.entries(grl[ami]||{}).forEach(([ut, gross]) => {
        if (gross == null) return;
        const ua = lookupUA(uas, ut);
        const net = gross - ua;
        rows += `<tr><td>${ut}</td><td>${ami.split('-')[0]}</td><td>$${gross.toLocaleString()}</td>
          <td style="color:var(--red)">${ua?"($"+ua+")":"—"}</td>
          <td style="font-weight:700">$${net.toLocaleString()}</td></tr>`;
      });
    });
    if (rows) tcRentHtml = `<div class="cert-section-head tc" style="margin-top:10px">Tax Credit &amp; Bond Rents${iNote(eff.grossRentLimits.from)}</div>
      <div class="rent-table-wrap"><table class="rent-table" style="font-size:10.5px">
        <tr><th>Unit</th><th>AMI%</th><th>Gross Limit</th><th>UA</th><th>Net Rent Limit</th></tr>${rows}</table></div>`;
  }

  // ── HUD Contract Rents (Gross − UA = Contract Rent) ───────────────────────
  let hudHtml = "";
  if (eff.hudContractRents?.val) {
    const entries = Object.entries(eff.hudContractRents.val).filter(([,v])=>v!=null);
    const uas = eff.utilityAllowances?.val || {};
    if (entries.length) {
      let rows = entries.map(([ut,contract]) => {
        const ua = lookupUA(uas, ut);
        const gross = contract + (ua||0);
        return `<tr><td>${ut}</td><td>$${gross.toLocaleString()}</td>
          <td style="color:var(--red)">${ua?"($"+ua+")":"—"}</td>
          <td style="font-weight:700">$${contract.toLocaleString()}</td></tr>`;
      }).join("");
      hudHtml = `<div class="cert-section-head hud" style="margin-top:10px">HUD Contract Rents${iNote(eff.hudContractRents.from)}</div>
        <div class="rent-table-wrap"><table class="rent-table" style="font-size:10.5px">
          <tr><th>Unit Type</th><th>Gross Rent</th><th>UA</th><th>Contract Rent</th></tr>${rows}</table></div>`;
    }
  }

  // ── Building 3620 (master metered — UA=$0) ──────────────────────────────────
  let bldg3620Html = "";
  const _b3620 = p.lihtc?.building3620;
  if (_b3620 && eff.grossRentLimits?.val) {
    const _grl3 = eff.grossRentLimits.val;
    let _b3rows = _b3620.units.map(u => {
      const gr = _grl3[u.ami]?.[u.type];
      if (!gr) return "";
      return `<tr><td>${u.id}</td><td>${u.type}</td><td>${u.ami}</td>`
        + `<td>$${gr.toLocaleString()}</td><td style="color:var(--mid-grey)">—</td>`
        + `<td style="font-weight:700">$${gr.toLocaleString()}</td></tr>`;
    }).join("");
    if (_b3rows) bldg3620Html = `
      <div class="cert-section-head" style="margin-top:10px;color:var(--teal)">Building 3620 — Master Metered (UA = $0)</div>
      <div class="rent-table-wrap"><table class="rent-table" style="font-size:10.5px">
        <tr><th>Unit #</th><th>Type</th><th>AMI%</th><th>Gross Limit</th><th>UA</th><th>Net Rent Limit</th></tr>${_b3rows}</table></div>
      <div class="notes-box" style="margin-top:4px;font-size:10px">${_b3620.note}</div>`;
  }

  // ── Utility Allowances ────────────────────────────────────────────────────
  let uaHtml = "";
  const _uasVal = eff.utilityAllowances?.val || p.lihtc?.utilityAllowances;
  if (_uasVal) {
    const uas = _uasVal;
    const entries = Object.entries(uas).filter(([,v])=>v>=0);
    if (entries.length) {
      const uaSourceMap = {
        "HUD - 3 Year Study":"Per HUD Contract Rent Schedule",
        "HUD - HUSM":"Per HUD Utility Schedule Model",
        "Local HA":"Per Local Housing Authority Schedule",
        "Engineered":"Per ECM Engineering Study",
        "Master Metered":"Owner-paid (Master Metered)",
      };
      const uaSourceNote = uaSourceMap[p.uaType] || (p.uaType ? "Per " + p.uaType : "");
      // UA adjustment history note (e.g. "Last adj: 06/01/2025 — OCAF Adjustment · Next: 06/01/2026 — 3-Year Utility Study")
      let uaAdjNote = "";
      if (p.uaHistory?.length) {
        const effD = eff.effectiveDate;
        const past = p.uaHistory.filter(h => !h.pending && h.date <= effD);
        const last = past[past.length - 1];
        const next = p.uaHistory.find(h => h.pending);
        const fmtUA = d => `${d.slice(5,7)}/${d.slice(8,10)}/${d.slice(0,4)}`;
        if (last) {
          uaAdjNote = `Last adj: ${fmtUA(last.date)} — ${last.type}`;
          if (next) uaAdjNote += ` · Next: ${fmtUA(next.date)} — ${next.type} (pending)`;
        }
      }

      // Build UA breakdown table if category data exists
      const breakdown = eff.uaBreakdown?.val || p.lihtc?.uaBreakdown;
      const CAT_LABELS = { heating:"Space Heating", cooking:"Cooking", waterHeating:"Water Heating",
        lights:"Lights / Misc Electric", otherElectric:"Other Electric", ac:"Air Conditioning",
        electric:"Electric", water:"Water", sewer:"Sewer",
        waterSewer:"Water & Sewer", trash:"Trash Collection", otherGas:"Other Gas" };
      let breakdownHtml = "";
      if (breakdown) {
        const unitTypes = Object.keys(breakdown);
        const cats = Object.keys(CAT_LABELS);
        const hasData = unitTypes.some(ut => cats.some(c => breakdown[ut][c] != null));
        if (hasData) {
          const headerCells = unitTypes.map(ut => `<th>${ut}</th>`).join("");
          const dataRows = cats.map(cat => {
            const vals = unitTypes.map(ut => breakdown[ut][cat]);
            if (vals.every(v => v == null)) return "";
            const cells = vals.map(v => `<td style="text-align:center">${v != null ? (v > 0 ? "$"+v : "—") : "<span style='color:var(--mid-grey);font-size:9px'>TBD</span>"}</td>`).join("");
            return `<tr><td style="font-size:10px;color:var(--dk-grey)">${CAT_LABELS[cat]}</td>${cells}</tr>`;
          }).filter(Boolean).join("");
          const totalRow = unitTypes.map(ut => {
            const sum = cats.reduce((a,c) => (breakdown[ut][c] || 0) + a, 0);
            const known = uas[ut];
            return `<td style="text-align:center;font-weight:700">${sum > 0 ? "$"+sum : known != null ? "$"+known : "—"}</td>`;
          }).join("");
          if (dataRows) breakdownHtml = `
            <div style="margin-top:8px">
              <table class="rent-table" style="font-size:10.5px">
                <tr><th style="text-align:left">Utility Category</th>${headerCells}</tr>
                ${dataRows}
                <tr style="border-top:2px solid var(--lt-grey)"><td style="font-size:10px;font-weight:700">Total UA</td>${totalRow}</tr>
              </table>
            </div>`;
        }
      }

      uaHtml = `<div class="cert-section-head ua" style="margin-top:10px">Utility Allowances${iNote(eff.utilityAllowances?.from)}</div>
        ${breakdownHtml || `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
          ${entries.map(([ut,v])=>`<span class="card-ua-chip">${ut}: $${v}</span>`).join("")}
        </div>`}
        ${uaSourceNote ? `<div style="font-size:9.5px;color:var(--mid-grey);font-style:italic;margin-top:4px">${uaSourceNote}</div>` : ""}
        ${uaAdjNote ? `<div style="font-size:9.5px;color:var(--mid-grey);font-style:italic;margin-top:2px">${uaAdjNote}</div>` : ""}`;
    }
  }

  // ── HOME Program Rent Limits ─────────────────────────────────────────────
  let homeRentHtml = "";
  if (p.home?.lowHomeRents || p.home?.highHomeRents) {
    const uas = p.lihtc?.utilityAllowances || {};
    const lr = p.home.lowHomeRents || {};
    const hr = p.home.highHomeRents || {};
    const unitTypes = [...new Set([...Object.keys(lr), ...Object.keys(hr)])];
    let rows = "";
    unitTypes.forEach(ut => {
      if (lr[ut] != null) {
        const gross = lr[ut]; const ua = lookupUA(uas, ut); const net = gross - ua;
        rows += `<tr style="background:#f0fdf4"><td>${ut}</td><td style="color:#166534;font-weight:600">Low HOME (≤50% AMI)</td><td>$${gross.toLocaleString()}</td>
          <td style="color:var(--red)">${ua?"($"+ua+")":"—"}</td>
          <td style="font-weight:700">$${net.toLocaleString()}</td></tr>`;
      }
      if (hr[ut] != null) {
        const gross = hr[ut]; const ua = lookupUA(uas, ut); const net = gross - ua;
        rows += `<tr style="background:#f0fdf4"><td>${ut}</td><td style="color:#166534;font-weight:600">High HOME (≤65% AMI/FMR)</td><td>$${gross.toLocaleString()}</td>
          <td style="color:var(--red)">${ua?"($"+ua+")":"—"}</td>
          <td style="font-weight:700">$${net.toLocaleString()}</td></tr>`;
      }
    });
    if (rows) {
      homeRentHtml = `<div class="cert-section-head" style="margin-top:10px;color:#166534">HOME Program Rent Limits</div>
        <div style="font-size:9.5px;color:var(--mid-grey);font-style:italic;margin-bottom:4px">Per HOME/SAIL LURA (1994-07-29): ≥40% of units @ ≤50% AMI → Low HOME rent; remaining @ ≤60% AMI → High HOME rent. Eff. 2026-06-01.</div>
        <div class="rent-table-wrap"><table class="rent-table" style="font-size:10.5px">
          <tr><th>Unit</th><th>HOME Tier</th><th>Gross Limit</th><th>UA</th><th>Net Rent Limit</th></tr>${rows}</table></div>`;
    }
  }

  const sourceNote = eff.source ? `<div style="font-size:9.5px;color:var(--mid-grey);font-style:italic;margin-top:10px">Source: ${eff.source}</div>` : "";

  // PDF download button
  const pdfBtn = `<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--lt-grey)">
    <button onclick="openCertPDF('${p.id}', ${activeCertIndex})" style="
      background:var(--blue-dark);color:#fff;border:none;padding:8px 18px;border-radius:4px;
      cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:600;
    ">↓ Download Manager Certification</button>
  </div>`;

  return incomeHtml + layeringHtml + ilByAgmtHtml + tcRentHtml + bldg3620Html + hudHtml + homeRentHtml + uaHtml + sourceNote + pdfBtn;
}


function toggleCertEvent(propId, certIndex) {
  if (_ACTIVE_CERT && _ACTIVE_CERT.propId === propId && _ACTIVE_CERT.certIndex === certIndex) {
    _ACTIVE_CERT = null;
  } else {
    _ACTIVE_CERT = { propId, certIndex };
  }
  showPanel(propId);
}

function openCertPDF(propId, certIndex) {
  const p = PORTFOLIO.find(x => x.id === propId);
  if (!p) return;

  const eff = getEffectiveSnapshot(p, certIndex);
  if (!eff) return;

  const hhCols = Array.from({length:getMaxHHCols(p)},(_,i)=>i+1);
  const effDate = (field) => eff[field]?.from ? eff[field].from : eff.effectiveDate;
  const fmtDate = (d) => { if(!d) return "—"; const [y,m,dy]=d.split('-'); return `${m}/${dy}/${y}`; };

  // ── Income Limits ─────────────────────────────────────────────────────────
  let incomeHtml = "";
  if (eff.incomeLimits?.val) {
    const il = eff.incomeLimits.val;
    const hasBothLayers = p.program === "Both" || p.program === "LIHTC/PBV";
    const isGreenleaf = p.id === "greenleaf";
    const isHUDS8 = (isGreenleaf || p.id === "cypress-pines" || p.id === "buckingham" || p.id === "claremont" || p.id === "lakeview-tower" || p.id === "casa-devon") && hasBothLayers;
    // Inject HUD threshold row for dual-layer properties
    let ilDisplay = {...il};
    const ilSrcMap = eff.incomeLimitSources?.val || null;
    const rows = Object.keys(ilDisplay).map(ami => {
      const row = ilDisplay[ami]||{};
      const is50HUD = ami === "50%" && (isGreenleaf || p.id === "lakeview-tower" || p.id === "casa-devon") && hasBothLayers;
      const is30HUD = ami === "30%" && isHUDS8;
      const label = is50HUD ? `${ami} <em style="font-size:9px;color:#1d4ed8">(HUD LI)</em>` : is30HUD ? `${ami} <em style="font-size:9px;color:#1d4ed8">(HUD ELI)</em>` : ami;
      const rowStyle = (is50HUD || is30HUD) ? ' style="background:#eff6ff"' : '';
      const srcCell = ilSrcMap ? `<td style="font-size:9px;color:#0f766e;font-weight:600">${ilSrcMap[ami]||"—"}</td>` : "";
      return `<tr${rowStyle}><td class="lbl">${label}</td>${srcCell}${hhCols.map(h=>`<td>${row[h]?"$"+Number(row[h]).toLocaleString():"—"}</td>`).join("")}</tr>`;
    }).join("");
    const ilDate = effDate("incomeLimits");
    const ilYear = ilDate ? ilDate.slice(0,4) : "";
    const srcHeader = ilSrcMap ? `<th>Source</th>` : "";
    incomeHtml = `<h3>Income Limits <span class="eff-date">Effective ${fmtDate(ilDate)}</span></h3>
      <table><thead><tr><th>AMI%</th>${srcHeader}${hhCols.map(h=>`<th>${h}p</th>`).join("")}</tr></thead>
      <tbody>${rows}</tbody></table>
      <p class="src-note">Income limits per FY${ilYear} MTSP Release (HUD), effective ${fmtDate(ilDate)}.${isGreenleaf && hasBothLayers ? ' 50% AMI (HUD LI) is the applicable HUD Section 8 income threshold.' : ''}${isHUDS8 ? ' 30% AMI (HUD ELI) is the applicable HUD Section 8 income threshold for tenant eligibility at move-in.' : ''}</p>`;
  }

  if ((p.certHistory||[]).some(c => c.trigger === 'home_htf_limits')) incomeHtml = ""; // Income limits shown in agreement-level section

  // ── Other Affordable Layering (Vista Woods H&S limits) ───────────────────
  let layeringHtml = "";
  const _ll = eff.layeringLimits?.val ?? p.lihtc?.layeringLimits;
  if (_ll) {
    const snapIL = eff.incomeLimits?.val || {};
    const layerRows = _ll.rows.map(row => {
      const lims = row.fromSnapshot ? (snapIL[row.ami] || {}) : (row.limits || {});
      const srcCell = `<td style="font-size:9px;color:#0f766e;font-weight:600">${row.source}</td>`;
      return `<tr><td class="lbl">${row.ami}</td>${srcCell}<td style="font-size:10px">${row.program}</td>${hhCols.map(h=>`<td>${lims[h]?"$"+Number(lims[h]).toLocaleString():"—"}</td>`).join("")}</tr>`;
    }).join("");
    layeringHtml = `<h3>Other Affordable Layering — H&amp;S Income Limits</h3>
      <p class="src-note" style="margin-bottom:6px">Limits applicable above LIHTC/Bond per H&amp;S Code programs (Contra Costa County HCD FY${_ll.amiYear}). CTCAC 80% auto-populated from HUD MTSP.</p>
      <table><thead><tr><th>AMI%</th><th>Source</th><th>Program</th>${hhCols.map(h=>`<th>${h}p</th>`).join("")}</tr></thead>
      <tbody>${layerRows}</tbody></table>`;
  }

  // ── Income Limits by Agreement ────────────────────────────────────────────
  let ilByAgmtPdfHtml = "";
  if (eff.incomeLimitsByAgreement?.val) {
    const ilba = eff.incomeLimitsByAgreement.val;
    let sections = "";
    Object.entries(ilba).forEach(([agmtName, agmtData]) => {
      const {source, ...amiData} = agmtData;
      let rows = "";
      Object.entries(amiData).forEach(([ami, limits]) => {
        if (!limits) return;
        rows += `<tr><td class="lbl">${ami}</td>${hhCols.map(h=>`<td>${limits[h]?"$"+Number(limits[h]).toLocaleString():"—"}</td>`).join("")}</tr>`;
      });
      if (rows) {
        const srcNote = source ? ` <em style="font-size:9px;color:#0f766e">(${source})</em>` : "";
        sections += `<h4 style="margin:10px 0 4px;font-size:10.5px;color:#1f2937">${agmtName}${srcNote}</h4>
          <table><thead><tr><th>AMI%</th>${hhCols.map(h=>`<th>${h}p</th>`).join("")}</tr></thead>
          <tbody>${rows}</tbody></table>`;
      }
    });
    if (sections) ilByAgmtPdfHtml = `<h3>Income Limits by Agreement</h3>
      <p class="src-note">Effective income limit per program overlay — lesser of HUD MTSP vs HOME/HTF at each certification date.</p>
      ${sections}`;
  }

  // ── Affordable Rents (or Tax Credit & Bond Rents) ─────────────────────────
  let tcHtml = "";
  if (eff.rentsByAgreement?.val) {
    const rba = eff.rentsByAgreement.val;
    const uas = eff.utilityAllowances?.val || {};
    const tcDate = effDate("grossRentLimits") || effDate("rentsByAgreement");
    let sections = "";
    Object.entries(rba).forEach(([agmtName, agmtData]) => {
      const {source, ...amiData} = agmtData;
      let rows = "";
      Object.entries(amiData).forEach(([ami, units]) => {
        Object.entries(units||{}).forEach(([ut, gross]) => {
          if (gross == null) return;
          const ua = lookupUA(uas, ut);
          const net = gross - ua;
          rows += `<tr><td>${ut}</td><td>${ami}</td><td>$${gross.toLocaleString()}</td>
            <td style="color:#dc2626">${ua?"($"+ua+")":"—"}</td>
            <td><strong>$${net.toLocaleString()}</strong></td></tr>`;
        });
      });
      if (rows) {
        const srcNote = source ? ` <em style="font-size:9px;color:#0f766e">(${source})</em>` : "";
        sections += `<h4 style="margin:10px 0 4px;font-size:10.5px;color:#1f2937">${agmtName}${srcNote}</h4>
          <table><thead><tr><th>Unit</th><th>AMI%</th><th>Gross Limit</th><th>UA</th><th>Net Rent Limit</th></tr></thead>
          <tbody>${rows}</tbody></table>`;
      }
    });
    if (sections) tcHtml = `<h3>Affordable Rents <span class="eff-date">Effective ${fmtDate(tcDate)}</span></h3>${sections}`;
  } else if (eff.grossRentLimits?.val) {
    const grl = eff.grossRentLimits.val;
    const uas = eff.utilityAllowances?.val || {};
    let rows = "";
    Object.keys(grl).forEach(ami => {
      Object.entries(grl[ami]||{}).forEach(([ut,gross]) => {
        if (gross==null) return;
        const ua = lookupUA(uas,ut);
        const net = gross - ua;
        rows += `<tr><td>${ut}</td><td>${ami}</td><td>$${gross.toLocaleString()}</td>
          <td style="color:#dc2626">${ua?"($"+ua+")":"—"}</td>
          <td><strong>$${net.toLocaleString()}</strong></td></tr>`;
      });
    });
    const tcDate = effDate("grossRentLimits");
    const tcYear = tcDate ? tcDate.slice(0,4) : "";
    if (rows) tcHtml = `<h3>Tax Credit &amp; Bond Rents <span class="eff-date">Effective ${fmtDate(tcDate)}</span></h3>
      <table><thead><tr><th>Unit</th><th>AMI%</th><th>Gross Limit</th><th>UA</th><th>Net Rent Limit</th></tr></thead>
      <tbody>${rows}</tbody></table>
      <p class="src-note">Tax credit and bond rents per FY${tcYear} MTSP Release (HUD), effective ${fmtDate(tcDate)}.</p>`;
  }

  // ── HUD Contract Rents ────────────────────────────────────────────────────
  let hudHtml = "";
  if (eff.hudContractRents?.val) {
    const entries = Object.entries(eff.hudContractRents.val).filter(([,v])=>v!=null);
    const uas = eff.utilityAllowances?.val || {};
    if (entries.length) {
      let rows = entries.map(([ut,contract]) => {
        const ua = lookupUA(uas,ut);
        const gross = contract+(ua||0);
        return `<tr><td>${ut}</td><td>$${gross.toLocaleString()}</td>
          <td style="color:#dc2626">${ua?"($"+ua+")":"—"}</td>
          <td><strong>$${contract.toLocaleString()}</strong></td></tr>`;
      }).join("");
      const hudDate = effDate("hudContractRents");
      hudHtml = `<h3>HUD Contract Rents <span class="eff-date">Effective ${fmtDate(hudDate)}</span></h3>
        <table><thead><tr><th>Unit Type</th><th>Gross Rent</th><th>UA</th><th>Contract Rent</th></tr></thead>
        <tbody>${rows}</tbody></table>
        <p class="src-note">Per HUD Contract Rent Schedule (HAP ${p.hud?.contractNumber||""}), effective ${fmtDate(hudDate)}.</p>`;
    }
  }

  // ── Building 3620 (master metered — UA=$0) PDF ─────────────────────────────
  let bldg3620PdfHtml = "";
  const _b3620p = p.lihtc?.building3620;
  if (_b3620p && eff.grossRentLimits?.val) {
    const _grl3p = eff.grossRentLimits.val;
    let _b3rowsp = _b3620p.units.map(u => {
      const gr = _grl3p[u.ami]?.[u.type];
      if (!gr) return "";
      return `<tr><td>${u.id}</td><td>${u.type}</td><td>${u.ami}</td>`
        + `<td>$${gr.toLocaleString()}</td><td>—</td><td><strong>$${gr.toLocaleString()}</strong></td></tr>`;
    }).join("");
    if (_b3rowsp) bldg3620PdfHtml = `<h3>Building 3620 — Master Metered (UA = $0) <span class="eff-date">Net Rent = Gross Limit</span></h3>
      <table><thead><tr><th>Unit #</th><th>Type</th><th>AMI%</th><th>Gross Limit</th><th>UA</th><th>Net Rent Limit</th></tr></thead>
      <tbody>${_b3rowsp}</tbody></table>
      <p class="src-note">${_b3620p.note}</p>`;
  }

  // ── Utility Allowances ────────────────────────────────────────────────────
  let uaHtml = "";
  const _pdfUas = eff.utilityAllowances?.val || p.lihtc?.utilityAllowances;
  if (_pdfUas) {
    const uaEntries = Object.entries(_pdfUas).filter(([,v])=>v>=0);
    if (uaEntries.length) {
      const uaDate = effDate("utilityAllowances");
      const uaAgency = (p.uaType === "Local HA") ? "Housing Authority" : (p.uaType || "HUD Study");
      const pdfBreakdown = eff.uaBreakdown?.val || p.lihtc?.uaBreakdown;

      // Utility type and resident-pays metadata for each category
      const UA_META = {
        heating:      { label:"Space Heating",         type:"Gas",      resPays: v => v > 0 },
        cooking:      { label:"Cooking",               type:"Gas",      resPays: v => v > 0 },
        waterHeating: { label:"Water Heating",         type:"Gas/Elec", resPays: v => v > 0 },
        lights:       { label:"Other Monthly Electric",type:"Electric", resPays: v => v > 0 },
        otherElectric:{ label:"Other Electric",        type:"Electric", resPays: v => v > 0 },
        ac:           { label:"Air Conditioning",      type:"Electric", resPays: v => v > 0 },
        electric:     { label:"Electric",              type:"Electric", resPays: v => v > 0 },
        water:        { label:"Water",                 type:"Water",    resPays: v => v > 0 },
        sewer:        { label:"Sewer",                 type:"Sewer",    resPays: v => v > 0 },
        waterSewer:   { label:"Water & Sewer",         type:"Water",    resPays: v => v > 0 },
        trash:        { label:"Trash Collection",      type:"Trash",    resPays: v => v > 0 },
        otherGas:     { label:"Other Monthly Gas",     type:"Gas",      resPays: v => v > 0 },
      };

      let uaContent = "";
      if (pdfBreakdown) {
        const unitTypes = Object.keys(pdfBreakdown);
        const cats = Object.keys(UA_META);
        // Filter to rows where at least one unit type has a non-null value
        const visibleCats = cats.filter(cat => unitTypes.some(ut => pdfBreakdown[ut]?.[cat] != null));
        const headerCells = unitTypes.map(ut => `<th>${ut}</th>`).join("");
        const dataRows = visibleCats.map(cat => {
          const meta = UA_META[cat];
          const vals = unitTypes.map(ut => pdfBreakdown[ut]?.[cat] ?? null);
          const anyPositive = vals.some(v => v > 0);
          const resPays = anyPositive ? "Yes" : "No";
          const utilType = anyPositive ? meta.type : "N/A";
          const cells = vals.map(v => `<td>${v != null && v > 0 ? "$"+v : "—"}</td>`).join("");
          return `<tr><td class="lbl">${meta.label}</td><td style="text-align:center">${resPays}</td><td style="text-align:center">${utilType}</td>${cells}</tr>`;
        }).join("");
        // If no category rows have data, fall back to chips (breakdown shell with all-null values)
        if (!visibleCats.length) {
          uaContent = `<div class="ua-chips">${uaEntries.map(([ut,v])=>`<span class="ua-chip">${ut}: $${v}</span>`).join("")}</div>`;
        } else {
          const totalCells = unitTypes.map(ut => {
            const catSum = cats.reduce((s,c) => s + (pdfBreakdown[ut]?.[c] || 0), 0);
            // Fall back to known snapshot UA total if category sum is 0
            const tot = catSum > 0 ? catSum : (_pdfUas[ut] ?? 0);
            return `<td><strong>${tot > 0 ? "$"+tot : "—"}</strong></td>`;
          }).join("");
          uaContent = `<table>
            <thead><tr><th>Utility</th><th>Resident Pays</th><th>Utility Type</th>${headerCells}</tr></thead>
            <tbody>${dataRows}
            <tr style="border-top:2px solid #d1dde6"><td class="lbl"><strong>Total</strong></td><td></td><td></td>${totalCells}</tr>
            </tbody></table>`;
        }
      } else {
        // Fallback to chips if no breakdown data
        uaContent = `<div class="ua-chips">${uaEntries.map(([ut,v])=>`<span class="ua-chip">${ut}: $${v}</span>`).join("")}</div>`;
      }

      const uaSourceNote = {
        "HUD - 3 Year Study":"Per HUD Contract Rent Schedule",
        "HUD - HUSM":"Per HUD Utility Schedule Model",
        "Local HA":"Per Local Housing Authority Schedule",
        "Engineered":"Per ECM Engineering Study",
        "Master Metered":"Owner-paid (Master Metered)",
      }[p.uaType] || (p.uaType ? "Per " + p.uaType : "");

      // UA adjustment history note for PDF
      let pdfUaAdjNote = "";
      if (p.uaHistory?.length) {
        const effD = eff.effectiveDate;
        const past = p.uaHistory.filter(h => !h.pending && h.date <= effD);
        const last = past[past.length - 1];
        const next = p.uaHistory.find(h => h.pending);
        if (last) {
          pdfUaAdjNote = ` Last adjustment: ${fmtDate(last.date)} — ${last.type}.`;
          if (next) pdfUaAdjNote += ` Next scheduled: ${fmtDate(next.date)} — ${next.type}.`;
        }
      }

      uaHtml = `<h3>Utility Allowance Breakdown <span class="eff-date">Effective ${fmtDate(uaDate)}</span></h3>
        ${uaContent}
        <p class="src-note">${uaSourceNote}${p.lihtc?.uaAgency ? " — " + p.lihtc.uaAgency : ""}. Effective ${fmtDate(uaDate)}.${pdfUaAdjNote}</p>`;
    }
  }

  // ── Regulatory Agreements ─────────────────────────────────────────────────
  const regs = p.regulatoryAgreements || [];
  let regHtml = "";
  if (regs.length) {
    regHtml = `<h3>Affordable Programs &amp; Regulatory Agreements</h3>
      <table><thead><tr><th>Type</th><th>Program</th><th>With</th><th>Ref</th><th>PIS / Effective</th><th>Compliance Period</th></tr></thead>
      <tbody>${regs.map(r=>`<tr><td>${r.type}</td><td>${r.programType||"—"}</td><td>${r.with||"—"}</td>
        <td style="font-family:monospace;font-size:10px">${r.ref||"—"}</td>
        <td>${r.placedInService||r.effectiveDate||"—"}</td><td>${r.compliancePeriod||"—"}</td></tr>`).join("")}</tbody></table>`;
  }

  // ── Last Inspection ─────────────────────────────────────────────────────────
  let liHtml = "";
  {
    const li = p.lastInspection;
    if (li) {
      const SC = {"Superior":"#00c875","Above Average":"#007eb5","Satisfactory":"#9d50dd","Below Average":"#fdab3d","Unsatisfactory":"#df2f4a","N/A":"#9ca3af"};
      const liDate = (d) => { if (!d) return "—"; const p = d.split("-"); return (+p[1]) + "/" + (+p[2]) + "/" + p[0]; };
      const liScore = (s) => {
        if (!s) return "—";
        const col = SC[s] || "#6b7280";
        return '<span style="background:' + col + '22;color:' + col + ';border:1px solid ' + col + '55;border-radius:3px;padding:1px 5px;font-size:8.5px;font-weight:700">' + s + '</span>';

      const liRow = (lbl, t) =>
        '<tr><td style="padding:4px 8px;font-size:9.5px;font-weight:600;color:#374151">' + lbl + '</td>' +
        '<td style="padding:4px 8px;font-size:9.5px">' + liDate(t.date) + '</td>' +

      liHtml =
        '<div style="margin:18px 0 12px">' +
        '<div style="font-size:11px;font-weight:700;color:#1f2937;border-bottom:1px solid #e5e7eb;padding-bottom:5px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">' +

        '</div>' +
        '<table style="width:100%;border-collapse:collapse">' +
        '<thead><tr style="background:#f9fafb">' +
        '<th style="padding:4px 8px;text-align:left;font-size:8.5px;color:#9ca3af;font-weight:600">Type</th>' +
        '<th style="padding:4px 8px;text-align:left;font-size:8.5px;color:#9ca3af;font-weight:600">Last Date</th>' +
        '<th style="padding:4px 8px;text-align:left;font-size:8.5px;color:#9ca3af;font-weight:600">Score / Result</th>' +
        '<th style="padding:4px 8px;text-align:left;font-size:8.5px;color:#9ca3af;font-weight:600">Next Expected</th>' +
        '</tr></thead>' +
        '<tbody>' + liRow("MOR", li.mor) + liRow("NSPIRE", li.nspire) + '</tbody>' +
        '</table></div>';
    }
  }

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">

function renderRegulatoryAgreements(p) {
  const ras = p.regulatoryAgreements;
  if (!ras || !ras.length) return "";

  // Color by programType (consistent across all properties)
  function raColor(ra) {
    const pt = (ra.programType || "").toLowerCase();
    const t  = (ra.type || "").toLowerCase();
    if (pt.includes("lihtc") && pt.includes("bond")) return "#ede9fe:#5b21b6"; // LIHTC/Bond — purple
    if (pt.includes("lihtc") || t.includes("lura") || t.includes("8609") || t.includes("tax credit") || t.includes("mhdc") || t.includes("mshda") || t.includes("fhfc")) return "#e0f2fe:#075985"; // LIHTC — blue
    if (pt.includes("bond") || t.includes("bond") || t.includes("cmfa") || t.includes("cscda") || t.includes("ida ")) return "#ede9fe:#5b21b6"; // Bond — purple
    if (pt.includes("pbv") || t.includes("pbv") || t.includes("voucher")) return "#ccfbf1:#0f766e"; // PBV — teal
    if (pt.includes("hud loan") || pt === "hud loan") return "#dcfce7:#166534"; // HUD Loan — green
    if (pt === "home/htf" || pt === "home" || pt.includes("home/htf") || (pt.includes("home") && !pt.includes("hud"))) return "#ffedd5:#9a3412"; // HOME/HTF — orange
    if (pt.includes("hud") || t.includes("hud") || t.includes("hap") || t.includes("section 8") || t.includes("use agreement") || t.includes("chapter 15") || t.includes("mark-up")) return "#fef3c7:#92400e"; // HUD — amber
    if (pt.includes("city") || t.includes("lcra") || t.includes("redevelopment") || t.includes("abatement") || t.includes("vhda") || t.includes("cda")) return "#f5f5f4:#57534e"; // City/State — gray
    return "#f1f5f9:#64748b"; // default
  }

  const rows = ras.map(ra => {
    const link1 = ra.spUrl  ? `<a href="${ra.spUrl}"  target="_blank" style="color:var(--blue);font-weight:600;text-decoration:none;font-size:10px;display:block">&#128196; Open</a>` : "";
    const link2 = ra.spUrl2 ? `<a href="${ra.spUrl2}" target="_blank" style="color:var(--blue);font-weight:600;text-decoration:none;font-size:10px;display:block;margin-top:4px">&#128196; Open</a>` : "";
    const linkHtml = (link1 || link2) ? (link1 + link2) : `<span style="color:var(--mid-grey);font-size:10px">—</span>`;
    const [bg, fg] = raColor(ra).split(":");
    const pisDate = ra.placedInService ? `<div style="font-size:9px;color:var(--mid-grey);margin-top:2px">PIS: ${ra.placedInService}</div>` : "";

    return `<tr>
      <td style="min-width:160px">
        <span style="background:${bg};color:${fg};font-size:9px;font-weight:700;padding:2px 7px;border-radius:12px;white-space:nowrap;display:inline-block">${ra.programType || ""}</span>
        <div style="font-weight:600;font-size:11px;margin-top:4px;line-height:1.3">${ra.type}</div>
        <div style="font-size:10px;color:var(--mid-grey);margin-top:1px;line-height:1.3">${ra.with}</div>
        ${pisDate}
      </td>
      <td style="font-size:10px;color:var(--dk-grey);font-family:'IBM Plex Mono',monospace;max-width:140px;overflow-wrap:break-word;word-break:normal">${ra.ref || "—"}</td>
      <td style="font-size:10px;color:var(--dk-grey);max-width:120px">${ra.compliancePeriod || "—"}</td>
      <td style="font-size:10px;color:var(--dk-grey);white-space:nowrap">${ra.complianceEnd ? fmtDate(ra.complianceEnd,'short') : "—"}</td>
      <td style="font-size:10px;max-width:130px">${ra.setAsides || "—"}</td>
      <td style="min-width:52px;text-align:center">${linkHtml}</td>
    </tr>`;
  }).join("");

  return `<div class="section" style="margin-top:20px">
    <div class="section-title"><div class="section-bar" style="background:var(--purple)"></div>Affordable Programs &amp; Regulatory Agreements
      <span style="font-size:10px;font-weight:400;color:var(--mid-grey);text-transform:none;letter-spacing:0">(${ras.length} on file)</span>
    </div>
    <div class="rent-table-wrap">
    <table class="rent-table">
      <tr>
        <th style="text-align:left;width:28%">Type / Counterparty</th>
        <th style="text-align:left;width:18%">Reference</th>
        <th style="text-align:left;width:20%">Period</th>
        <th style="text-align:left;width:8%">Expires</th>
        <th style="text-align:left;width:18%">Set-Asides</th>
        <th style="width:8%">Doc</th>
      </tr>
      ${rows}
    </table>
    </div>
  </div>`;
}


function showPanel(id) {
  const p = PORTFOLIO.find(x => x.id === id);
  if (!p) return;
  _ACTIVE_PANEL_ID = id;
  const c = getComplianceInfo(p);
  const prog = p.program || "Unknown";

  // Auto-select most recent cert if none selected for this property
  const histAsc = (p.certHistory || []).slice().sort((a,b) => a.effectiveDate.localeCompare(b.effectiveDate));
  if (histAsc.length && (!_ACTIVE_CERT || _ACTIVE_CERT.propId !== id)) {
    // Auto-select the most recent cert on or before today
    const todayStr = TODAY.toISOString().slice(0,10);
    let bestIdx = 0;
    histAsc.forEach((cert, i) => { if (cert.effectiveDate <= todayStr) bestIdx = i; });
    _ACTIVE_CERT = { propId: id, certIndex: bestIdx };
  }

  // Unit mix

  // ── RENT & INCOME LIMITS SECTION ──────────────────────────────────────────
  let limitsHtml = "";

  // Limits section removed — cert history panel shows complete info
    certSectionHtml = `
      <div class="cert-section-wrap">
        <div class="section">
          ${buildCertRibbon(p)}
          ${renderCertHistory(p)}
        </div>
      </div>`;

  // ── REGULATORY AGREEMENTS ──────────────────────────────────────────────────
  const regAgreementsHtml = renderRegulatoryAgreements(p);

  // Panel pills
  const compSt = c.status;
  const amiPills = (p.lihtc?.setAsides||[]).map(s =>
    `<span class="pill pill-ami">${s.pct}% AMI</span>`).join("");

  document.getElementById("panel").innerHTML = `
    <div class="panel-header">
      <div>
        <div class="panel-region">${p.region} · ${p.county} County</div>
        <div class="panel-name">${p.name}</div>
